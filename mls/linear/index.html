<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Linear Classification | MLS</title>
    <style>
        :root { --ucph-red: #901111; --text: #2c3e50; --trop: #e67e22; --not-trop: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; color: var(--text); margin: 0; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        header { background: var(--ucph-red); color: white; padding: 1.5rem; text-align: center; width: 100%; max-width: 1200px; border-radius: 8px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 300; }
        .back-link { color: white; text-decoration: none; font-size: 0.8rem; opacity: 0.8; }
        .wrapper { display: flex; gap: 30px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); max-width: 1200px; width: 100%; }
        .viz-container { flex: 1.5; display: flex; flex-direction: column; align-items: center; }
        svg { border: 1.5px solid #333; background: #fff; }
        .controls-panel { flex: 0.8; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .control-group { margin-bottom: 20px; }
        label { font-size: 0.85rem; font-weight: 600; display: flex; justify-content: space-between; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
        .value-display { font-family: monospace; background: #eee; padding: 2px 5px; border-radius: 3px; }
        #accuracy-banner { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 6px; border-bottom: 1px solid #eee; }
        .trop-cell { color: var(--trop); font-weight: bold; }
        .nt-cell { color: var(--not-trop); font-weight: bold; }
        .axis-label { font-size: 12px; fill: #666; font-weight: bold; }
        .tick-label { font-size: 10px; fill: #999; }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="back-link">⟵ Back to Course Overview</a>
    <h1>Binary Linear Classification</h1>
    <div style="font-size: 0.9rem; margin-top: 5px;">Classifying: Tropical vs. Others</div>
</header>

<div class="wrapper">
    <div class="controls-panel">
        <div id="accuracy-banner" class="fail">Accuracy: 0%</div>
        
        <div class="control-group">
            <label>Bias (w₀): <span id="w0-val" class="value-display">0</span></label>
            <input type="range" id="w0" min="-120" max="120" step="1" value="-30">
        </div>
        <div class="control-group">
            <label>w₁ (Temperature): <span id="w1-val" class="value-display">0</span></label>
            <input type="range" id="w1" min="-10" max="10" step="0.1" value="1.5">
        </div>
        <div class="control-group">
            <label>w₂ (Rainfall): <span id="w2-val" class="value-display">0</span></label>
            <input type="range" id="w2" min="-0.1" max="0.1" step="0.001" value="0.01">
        </div>

        <table id="data-table">
            <thead>
                <tr><th>Country</th><th>Actual</th><th>Pred.</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="viz-container">
        <svg id="plot" width="550" height="450"></svg>
        <div style="display: flex; gap: 20px; margin-top: 15px; font-size: 0.85rem;">
            <span><span style="color:var(--trop)">●</span> Tropical</span>
            <span><span style="color:var(--not-trop)">●</span> Not Tropical</span>
            <span><span style="color:#e74c3c; font-weight:bold;">—</span> Boundary ($w^Tx=0$)</span>
        </div>
    </div>
</div>

<script>
    const data = [
        { c: "Brazil", t: 25, r: 2500, isTrop: true },
        { c: "Saudi Arabia", t: 30, r: 100, isTrop: false },
        { c: "Germany", t: 10, r: 800, isTrop: false },
        { c: "Canada", t: -5, r: 600, isTrop: false },
        { c: "Siberia", t: -15, r: 150, isTrop: false },
        { c: "India", t: 28, r: 1500, isTrop: true },
        { c: "Australia", t: 22, r: 500, isTrop: false },
        { c: "Argentina", t: 12, r: 1200, isTrop: false },
        { c: "Greenland", t: -10, r: 100, isTrop: false },
        { c: "Mexico", t: 20, r: 800, isTrop: true },
        { c: "Russia", t: -10, r: 600, isTrop: false }
    ];

    const svg = document.getElementById('plot');
    const P = { L: 50, R: 30, T: 30, B: 50 };
    const W = 550, H = 450;

    const tX = t => P.L + (t + 25) * (W - P.L - P.R) / 65;
    const rY = r => (H - P.B) - (r * (H - P.T - P.B) / 2600);

    const inputs = { w0: document.getElementById('w0'), w1: document.getElementById('w1'), w2: document.getElementById('w2') };
    const displays = { w0: document.getElementById('w0-val'), w1: document.getElementById('w1-val'), w2: document.getElementById('w2-val'), acc: document.getElementById('accuracy-banner') };

    function update() {
        const w0 = parseFloat(inputs.w0.value), w1 = parseFloat(inputs.w1.value), w2 = parseFloat(inputs.w2.value);
        displays.w0.innerText = w0; displays.w1.innerText = w1.toFixed(1); displays.w2.innerText = w2.toFixed(3);

        let correct = 0;
        const tbody = document.querySelector('#data-table tbody');
        tbody.innerHTML = '';

        svg.innerHTML = '';
        
        // Draw Boundary
        const x1 = -25, y1 = (-w1 * x1 - w0) / w2;
        const x2 = 40, y2 = (-w1 * x2 - w0) / w2;
        svg.innerHTML += `<line x1="${tX(x1)}" y1="${rY(y1)}" x2="${tX(x2)}" y2="${rY(y2)}" stroke="#e74c3c" stroke-width="3" />`;

        // Axes
        svg.innerHTML += `<text x="${W/2}" y="${H-10}" class="axis-label" text-anchor="middle">Annual Temp (°C)</text>`;
        svg.innerHTML += `<text x="15" y="${H/2}" class="axis-label" text-anchor="middle" transform="rotate(-90,15,${H/2})">Rainfall (mm)</text>`;

        data.forEach(d => {
            const score = w0 + (w1 * d.t) + (w2 * d.r);
            const pred = score > 0;
            const isCorrect = pred === d.isTrop;
            if (isCorrect) correct++;

            const color = d.isTrop ? 'var(--trop)' : 'var(--not-trop)';
            const halo = isCorrect ? '#2ecc71' : '#e74c3c';

            svg.innerHTML += `<circle cx="${tX(d.t)}" cy="${rY(d.r)}" r="8" fill="white" stroke="${halo}" stroke-width="2" />`;
            svg.innerHTML += `<circle cx="${tX(d.t)}" cy="${rY(d.r)}" r="5" fill="${color}" />`;

            tbody.innerHTML += `<tr>
                <td>${d.c}</td>
                <td class="${d.isTrop ? 'trop-cell' : 'nt-cell'}">${d.isTrop ? 'Yes' : 'No'}</td>
                <td style="color:${pred ? 'var(--trop)' : 'var(--not-trop)'}; font-weight:bold;">${pred ? 'Yes' : 'No'}</td>
            </tr>`;
        });

        const acc = (correct / data.length) * 100;
        displays.acc.innerText = `Accuracy: ${acc.toFixed(1)}%`;
        displays.acc.className = acc === 100 ? 'pass' : 'fail';
    }

    Object.values(inputs).forEach(i => i.addEventListener('input', update));
    update();
</script>
</body>
</html>
